<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PandOCR - 文档解析工作台</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%232f6df6'/%3E%3Ctext x='32' y='42' text-anchor='middle' font-family='Arial,sans-serif' font-size='34' font-weight='700' fill='white'%3EP%3C/text%3E%3C/svg%3E">
    <link rel="stylesheet" href="/static/style.css?v=21">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.2/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.1.6/purify.min.js"></script>
    <link rel="stylesheet" href="/static/vendor/katex/katex.min.css">
    <script defer src="/static/vendor/katex/katex.min.js"></script>
    <script defer src="/static/vendor/katex/contrib/auto-render.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>
<body>
    <div class="app-shell">
        <header class="topbar">
            <div class="brand">
                <button class="icon-button" id="sidebar-toggle" title="切换侧边栏">
                    <svg viewBox="0 0 24 24"><path d="M4 7h16M4 12h16M4 17h16"/></svg>
                </button>
                <div class="brand-mark">P</div>
                <div>
                    <div class="brand-name">PandOCR</div>
                    <div class="brand-subtitle">PaddleOCR-VL 文档解析</div>
                </div>
            </div>
            <div class="topbar-actions">
                <div class="model-pill">
                    <span id="model-status-dot" class="dot connecting"></span>
                    <span id="model-status-text">连接模型中...</span>
                </div>
            </div>
        </header>

        <div class="workspace">
            <aside class="sidebar" id="sidebar">
                <div class="sidebar-actions">
                    <button class="new-task-button" id="new-task-btn">
                        <svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
                        新解析
                    </button>
                </div>

                <details class="settings-panel">
                    <summary>
                        <span>
                            <svg viewBox="0 0 24 24"><path d="M12 15.5A3.5 3.5 0 1 0 12 8a3.5 3.5 0 0 0 0 7.5Z"/><path d="M19.4 15a1.8 1.8 0 0 0 .36 1.98l.05.05a2.1 2.1 0 1 1-2.97 2.97l-.05-.05a1.8 1.8 0 0 0-1.98-.36 1.8 1.8 0 0 0-1.1 1.66V21a2.1 2.1 0 1 1-4.2 0v-.08a1.8 1.8 0 0 0-1.1-1.66 1.8 1.8 0 0 0-1.98.36l-.05.05a2.1 2.1 0 1 1-2.97-2.97l.05-.05A1.8 1.8 0 0 0 4.6 15a1.8 1.8 0 0 0-1.66-1.1H3a2.1 2.1 0 1 1 0-4.2h.08A1.8 1.8 0 0 0 4.74 8.6a1.8 1.8 0 0 0-.36-1.98l-.05-.05A2.1 2.1 0 1 1 7.3 3.6l.05.05a1.8 1.8 0 0 0 1.98.36A1.8 1.8 0 0 0 10.42 2.35V2a2.1 2.1 0 1 1 4.2 0v.08a1.8 1.8 0 0 0 1.1 1.66 1.8 1.8 0 0 0 1.98-.36l.05-.05a2.1 2.1 0 1 1 2.97 2.97l-.05.05a1.8 1.8 0 0 0-.36 1.98 1.8 1.8 0 0 0 1.66 1.1H22a2.1 2.1 0 1 1 0 4.2h-.08A1.8 1.8 0 0 0 19.4 15Z"/></svg>
                            解析设置
                        </span>
                    </summary>
                    <div class="settings-grid">
                        <label><input type="checkbox" id="chart-recognition-switch"> 图表解析</label>
                        <label><input type="checkbox" id="doc-unwarping-switch"> 文档矫正</label>
                        <label><input type="checkbox" id="doc-orientation-switch"> 方向识别</label>
                        <label><input type="checkbox" id="seal-recognition-switch" checked> 印章识别</label>
                        <label><input type="checkbox" id="format-content-switch" checked disabled> 内容格式化</label>
                        <label><input type="checkbox" id="formula-number-switch" checked> 公式编号</label>
                        <label><input type="checkbox" id="ignore-header-switch" checked> 忽略页眉</label>
                        <label><input type="checkbox" id="ignore-footer-switch" checked> 忽略页脚</label>
                        <label><input type="checkbox" id="ignore-number-switch" checked> 忽略页码</label>
                        <label class="setting-number">
                            <span>每批页数</span>
                            <input type="number" id="pdf-batch-size-input" min="1" max="600" step="1" value="1" inputmode="numeric">
                        </label>
                    </div>
                </details>

                <div class="task-tabs">
                    <button class="task-tab active" data-filter="all">最近上传</button>
                    <button class="task-tab" data-filter="done">已完成</button>
                </div>
                <div class="task-tools">
                    <div class="search-box">
                        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
                        <input id="task-search" placeholder="搜索文件">
                    </div>
                    <button class="icon-button danger" id="clear-history-btn" title="清空历史">
                        <svg viewBox="0 0 24 24"><path d="M3 6h18M8 6V4h8v2M6 6l1 15h10l1-15"/></svg>
                    </button>
                </div>
                <div class="task-list" id="task-list"></div>
            </aside>

            <main class="document-workbench">
                <section class="source-pane">
                    <div class="pane-header">
                        <div>
                            <div class="pane-kicker">源文件</div>
                            <h2 id="source-title">等待上传文件</h2>
                        </div>
                        <div class="source-meta" id="source-meta">PDF、图片、Office 文档</div>
                    </div>
                    <div class="source-viewer" id="source-viewer">
                        <div class="drop-zone" id="drop-zone">
                            <svg viewBox="0 0 24 24"><path d="M12 3v12M7 8l5-5 5 5M4 15v4a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-4"/></svg>
                            <h3>拖拽文件到这里</h3>
                            <p>支持 PDF、图片、PPT/PPTX、DOC/DOCX；PDF 会逐页解析。</p>
                            <button class="primary-button" id="browse-btn">选择文件</button>
                        </div>
                    </div>
                    <div class="pdf-controls hidden" id="pdf-controls">
                        <button class="icon-button" id="prev-page-btn" title="上一页">
                            <svg viewBox="0 0 24 24"><path d="m15 18-6-6 6-6"/></svg>
                        </button>
                        <span id="page-indicator">1 / 1</span>
                        <button class="icon-button" id="next-page-btn" title="下一页">
                            <svg viewBox="0 0 24 24"><path d="m9 18 6-6-6-6"/></svg>
                        </button>
                        <button class="icon-button" id="zoom-out-btn" title="缩小">
                            <svg viewBox="0 0 24 24"><path d="M5 12h14"/></svg>
                        </button>
                        <button class="icon-button" id="zoom-in-btn" title="放大">
                            <svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
                        </button>
                    </div>
                </section>

                <section class="result-pane">
                    <div class="pane-header result-header">
                        <div>
                            <div class="pane-kicker">解析模型 <span class="model-name" id="active-model-name">PaddleOCR-VL-1.6</span></div>
                            <h2 id="result-title">解析结果</h2>
                        </div>
                        <div class="result-actions">
                            <button class="secondary-button" id="start-btn">
                                <svg viewBox="0 0 24 24"><path d="m8 5 11 7-11 7V5Z"/></svg>
                                开始解析
                            </button>
                            <button class="icon-button" id="copy-btn" title="复制 Markdown">
                                <svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
                            </button>
                            <button class="icon-button" id="download-btn" title="下载结果">
                                <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="M7 10l5 5 5-5M12 15V3"/></svg>
                            </button>
                        </div>
                    </div>
                    <div class="view-tabs">
                        <button class="view-tab active" data-view="markdown">文档解析</button>
                        <button class="view-tab" data-view="json">JSON</button>
                    </div>
                    <div class="result-viewer">
                        <div class="markdown-preview" id="markdown-view">
                            <div class="empty-result">选择左侧任务，或上传一个新文件开始解析。</div>
                        </div>
                        <div class="json-preview hidden" id="json-view"></div>
                    </div>
                </section>
            </main>
        </div>

        <input type="file" id="file-input" multiple accept=".pdf,.png,.jpg,.jpeg,.bmp,.webp,.tiff,.tif,.gif,.ppt,.pptx,.doc,.docx" hidden>
    </div>

    <template id="task-item-template">
        <div class="task-item" role="button" tabindex="0">
            <span class="task-icon"></span>
            <span class="task-main">
                <span class="task-name"></span>
                <span class="task-meta"></span>
            </span>
            <span class="task-state"></span>
            <button class="task-delete" type="button" title="删除任务" aria-label="删除任务">
                <svg viewBox="0 0 24 24"><path d="M3 6h18"/><path d="M8 6V4h8v2"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v5M14 11v5"/></svg>
            </button>
        </div>
    </template>

    <script charset="UTF-8" src="/static/app.js?v=46"></script>
</body>
</html>
